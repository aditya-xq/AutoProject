services:
  autoproject:
    image: autoproject:latest
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    ports:
      - '3000:3000'
    env_file:
      - autoproject/.env
    environment:
      NODE_ENV: production
      DOCKER_ENV: 'true'
      HOST: 0.0.0.0
      PORT: '3000'
      BACKEND_HOST: 127.0.0.1
      BACKEND_PORT: '3001'
      AUTOPROJECT_ROOT: /data
    volumes:
      - autoproject_data:/data
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    stop_grace_period: 30s

volumes:
  autoproject_data:
