name: 🚀 Build, Scan, and Publish Docker Image

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: xqbuilds/autoproject
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: 💾 Cache backend dependencies
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: bun-backend-${{ runner.os }}-${{ hashFiles('backend/bun.lockb') }}
          restore-keys: |
            bun-backend-${{ runner.os }}-

      - name: 💾 Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: autoproject/node_modules
          key: bun-frontend-${{ runner.os }}-${{ hashFiles('autoproject/bun.lockb') }}
          restore-keys: |
            bun-frontend-${{ runner.os }}-

      - name: 🔍 Backend typecheck
        run: |
          cd backend
          bun install --frozen-lockfile
          bun run check

      - name: 🧪 Backend unit tests
        run: |
          cd backend
          bun run test:unit

      - name: 🔍 Frontend typecheck
        run: |
          cd autoproject
          bun install --frozen-lockfile
          bun run check

      - name: 🏗️ Frontend build
        run: |
          cd autoproject
          bun run build

  build-scan-push:
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: 🏗️ Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build amd64 (for vulnerability scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🛡️ Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
        env:
          TRIVY_DISABLE_VEX_NOTICE: true

      - name: 🏗️ Build & Push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          provenance: true
          sbom: true

      - name: ✅ Verify multi-arch manifest
        run: |
          FIRST_TAG=$(echo '${{ steps.meta.outputs.tags }}' | cut -d',' -f1 | tr -d ' ')
          docker buildx imagetools inspect "$FIRST_TAG"
