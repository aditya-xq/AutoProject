name: 🚀 Build, Scan, and Publish Docker Image

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: xqbuilds/autoproject

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: 🔍 Backend typecheck
        run: |
          cd backend
          bun install --frozen-lockfile
          bun run check

      - name: 🧪 Backend unit tests
        run: |
          cd backend
          bun run test:unit

      - name: 🔍 Frontend typecheck
        run: |
          cd autoproject
          bun install --frozen-lockfile
          bun run check

      - name: 🏗️ Frontend build
        run: |
          cd autoproject
          bun run build

  build-scan-push:
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: 🛒 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: 🏗️ Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build & Push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: 🏷️ Resolve primary image tag
        id: primary-tag
        run: |
          PRIMARY=$(echo '${{ steps.meta.outputs.tags }}' | cut -d',' -f1 | tr -d ' ')
          echo "tag=$PRIMARY" >> "$GITHUB_OUTPUT"

      - name: 🛡️ Trivy Scan published image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ steps.primary-tag.outputs.tag }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
